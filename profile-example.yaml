# Example vault profile matching graphify built-in defaults (`graphify/profile.py::_DEFAULT_PROFILE`).
# Copy to `.graphify/profile.yaml` in your Obsidian vault and edit as needed.

taxonomy:
  version: v1.8
  root: Atlas/Sources/Graphify
  folders:
    moc: MOCs
    thing: Things
    statement: Statements
    person: People
    source: Sources
    default: Things
    unclassified: MOCs

folder_mapping:
  moc: Atlas/Sources/Graphify/MOCs/
  thing: Atlas/Sources/Graphify/Things/
  statement: Atlas/Sources/Graphify/Statements/
  person: Atlas/Sources/Graphify/People/
  source: Atlas/Sources/Graphify/Sources/
  default: Atlas/Sources/Graphify/Things/

# Output destination — see README §Output destination precedence
#
# path: '.' means "vault root" — graphify writes notes under the vault root,
# using folder_mapping[type] to place each note. This is the correct setting
# when your taxonomy/folder_mapping values already carry the full subpath
# (e.g. "Atlas/Sources/Graphify/Things/").
#
# Set path: 'SubDir' (no leading slash, no '..') ONLY when you want graphify
# to anchor ALL writes under <vault>/SubDir/ and your folder_mapping values
# are relative to that subdir.
#
# Common pitfall — nested vault folder:
#   Do NOT invoke `graphify --obsidian --obsidian-dir <vault-name>` from
#   the vault's parent directory. Either `cd` into the vault, or pass
#   `--vault <path>`, or pass `--output <abs>`. The precedence chain is:
#     --output > profile.output > --obsidian-dir > legacy default
output:
  mode: vault-relative
  path: .
  exclude: []

repo: {}

naming:
  convention: title_case
  concept_names:
    enabled: true
    budget: 0.0
    style: readable

merge:
  strategy: update
  preserve_fields:
    - rank
    - mapState
    - tags
    - created
  field_policies: {}

mapping_rules: []

obsidian:
  atlas_root: Atlas
  dataview:
    moc_query: |-
      TABLE file.folder as Folder, type, source_file
      FROM #community/${community_tag}
      SORT file.name ASC

dataview_queries: {}

topology:
  god_node:
    top_n: 10

mapping:
  min_community_size: 6

tag_taxonomy:
  garden:
    - plant
    - cultivate
    - probe
    - repot
    - revitalize
    - revisit
    - question
  graph:
    - component
    - domain
    - workflow
    - decision
    - concept
    - integration
    - service
    - dataset
    - team
    - extracted
    - inferred
    - ambiguous
  source:
    - confluence
    - readme
    - doc
    - code
    - paper
    - pdf
    - jira
    - slack
    - github
    - notion
    - obsidian
    - web
  tech:
    - python
    - typescript
    - javascript
    - go
    - rust
    - java
    - sql
    - graphql
    - docker
    - k8s

profile_sync:
  auto_update: true

diagram_types:
  - name: architecture
    template_path: Excalidraw/Templates/architecture.excalidraw.md
    trigger_node_types:
      - module
      - service
    trigger_tags:
      - architecture
    min_main_nodes: 3
    naming_pattern: '{topic}-architecture'
    layout_type: architecture
    output_path: Excalidraw/Diagrams/
  - name: workflow
    template_path: Excalidraw/Templates/workflow.excalidraw.md
    trigger_node_types:
      - function
      - process
    trigger_tags:
      - workflow
      - pipeline
    min_main_nodes: 3
    naming_pattern: '{topic}-workflow'
    layout_type: workflow
    output_path: Excalidraw/Diagrams/
  - name: repository-components
    template_path: Excalidraw/Templates/repository-components.excalidraw.md
    trigger_node_types:
      - module
      - file
    trigger_tags:
      - repo
      - components
    min_main_nodes: 3
    naming_pattern: '{topic}-repository-components'
    layout_type: repository-components
    output_path: Excalidraw/Diagrams/
  - name: mind-map
    template_path: Excalidraw/Templates/mind-map.excalidraw.md
    trigger_node_types:
      - concept
    trigger_tags:
      - mind-map
      - brainstorm
    min_main_nodes: 3
    naming_pattern: '{topic}-mind-map'
    layout_type: mind-map
    output_path: Excalidraw/Diagrams/
  - name: cuadro-sinoptico
    template_path: Excalidraw/Templates/cuadro-sinoptico.excalidraw.md
    trigger_node_types:
      - concept
      - category
    trigger_tags:
      - synoptic
      - cuadro-sinoptico
    min_main_nodes: 3
    naming_pattern: '{topic}-cuadro-sinoptico'
    layout_type: cuadro-sinoptico
    output_path: Excalidraw/Diagrams/
  - name: glossary-graph
    template_path: Excalidraw/Templates/glossary-graph.excalidraw.md
    trigger_node_types:
      - concept
      - term
    trigger_tags:
      - glossary
      - definitions
    min_main_nodes: 3
    naming_pattern: '{topic}-glossary-graph'
    layout_type: glossary-graph
    output_path: Excalidraw/Diagrams/
